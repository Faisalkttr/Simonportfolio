meta:
  name: "Infra Watchlist Portfolio Operating System"
  version: "1.0"
  base_currency: "USD"
  description: >
    Monthly DCA deployment schema for the infrastructure / AI-power / EM logistics
    watchlist. Each section maps to a scoring-family weight profile in engine.py.
    Update permissible_assets to add/remove tickers; the engine re-scores everything
    automatically on the next scheduled run.

sections:
  - name: "INFRA"
    description: "Large-cap industrial, data-center, and grid infrastructure compounders"
    target_weight: 0.15
    layers:
      - name: "Layer 1: Hard Assets"
        target_weight: 0.40
        permissible_assets:
          - TPL
          - ADPORTS.AE   # Abu Dhabi Ports (ADX Exchange Suffix)
          - ICTEY        # International Container Terminal Services ADR
      - name: "Layer 2: Grid & Utilities"
        target_weight: 0.40
        permissible_assets:
          - LIN
          - ABBN.SW      # ABB Ltd (SIX Swiss Exchange Suffix)
          - SU           # Suncor Energy Inc.
          - NVT          # nVent Electric plc
          - CEG          # Constellation Energy Corp.
          - PWR          # Quanta Services Inc.
          - CWCO         # Consolidated Water Co.
      - name: "Layer 3: Tech-Adjacent"
        target_weight: 0.20
        permissible_assets:
          - VRT          # Vertiv Holdings Co.
          - BE           # Bloom Energy Corp.

  - name: "ENERGY_COMMODITY"
    description: "Energy, power generation, and commodity-royalty names"
    target_weight: 0.23
    layers:
      - name: "Monetary Royalties"
        target_weight: 0.40
        permissible_assets:
          - FNV          # Franco-Nevada Corp.
          - WPM          # Wheaton Precious Metals
      - name: "Baseload Energy"
        target_weight: 0.40
        permissible_assets:
          - CCJ          # Cameco Corp.
          - CNQ          # Canadian Natural Resources
          - XOM          # Exxon Mobil Corp.
      - name: "Industrial Materials"
        target_weight: 0.20
        permissible_assets:
          - FCX          # Freeport-McMoRan Inc.
          - BHP          # BHP Group Ltd ADR
          - NEM          # Newmont Corp.
          - COP          # ConocoPhillips

  - name: "AI_SEMIS"
    description: "AI infrastructure hardware — power, cooling, fuel cells (higher volatility)"
    target_weight: 0.10
    layers:
      - name: "Layer 1: Physical Monopolies"
        target_weight: 0.60
        permissible_assets:
          - TSM          # Taiwan Semiconductor Manufacturing ADR
          - ASML         # ASML Holding NV ADR
          - SHECY        # Shin-Etsu Chemical ADR
          - 6920.T       # Lasertec Corp (Tokyo Stock Exchange Suffix)
      - name: "Layer 2: Architecture & Robotics"
        target_weight: 0.30
        permissible_assets:
          - AVGO         # Broadcom Inc.
          - CDNS         # Cadence Design Systems
          - QCOM         # Qualcomm Inc.
          - FANUY        # Fanuc Corp ADR
          - 8035.T       # Tokyo Electron Ltd (Tokyo Stock Exchange Suffix)
          - SNPS         # Synopsys Inc.
      - name: "Layer 3: Velocity Applications"
        target_weight: 0.10
        permissible_assets:
          - NOW          # ServiceNow Inc.
          - PANW         # Palo Alto Networks
          - STX          # Seagate Technology

  - name: "EM"
    description: "Emerging-market / international infrastructure and utilities"
    target_weight: 0.07
    layers:
      - name: "INDIA"
        target_weight: 0.40
        permissible_assets:
          - ABB.NS          # ABB India Ltd (NSE Suffix)
          - SIEMENS.NS      # Siemens India Ltd (NSE Suffix)
          - HITACHIENER.NS  # Hitachi Energy India (NSE Ticker Check)
          - CGPOWER.NS      # CG Power & Industrial Solutions (NSE Suffix)
          - PIIND.NS        # PI Industries Ltd (NSE Ticker Check)
          - SUNPHARMA.NS    # Sun Pharmaceutical Industries (NSE Suffix)
          - HCLTECH.NS      # HCL Technologies Ltd (NSE Suffix)
      - name: "GCC"
        target_weight: 0.40
        permissible_assets:
          - 2222.SR         # Saudi Aramco (Tadawul Suffix)
          - ADNOCGAS.AE     # ADNOC Gas (ADX Exchange Suffix)
          - ACWAPOWER.SR    # ACWA Power Co (Tadawul Suffix)
          - STC.SR          # Saudi Telecom Company (Tadawul Suffix)
      - name: "Other Jurisdiction"
        target_weight: 0.20
        permissible_assets:
          - 7203.T          # Toyota Motor / Alternative Japan Proxy (replaces HIJP text placeholder)
          - TLK             # Telkom Indonesia ADR
          - VALE            # Vale S.A. ADR
          - ISDE            # iShares MSCI UAE ETF (Tradeable proxy mapping for regional tracking)

deployment_rules:
  tier_1:
    label: "Accumulate Heavy"
    capital_share_range: [50, 70]
    description: "Quality and price both favorable this month — highest conviction for new money."
  tier_2:
    label: "Maintenance DCA"
    capital_share_range: [30, 50]
    description: "Fundamentally strong, but not the best entry point this month — keep steady, smaller DCA."
  tier_3:
    label: "Strictly Capped / Trim"
    capital_share_range: [0, 0]
    description: "Valuation, momentum, or sentiment stretched — zero or near-zero new capital."

position_caps:
  default_max_position_pct: 8
  overrides: {}
